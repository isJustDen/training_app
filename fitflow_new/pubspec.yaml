name: fitflow
description: "Приложение для тренировок"
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.10.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  audioplayers: ^6.5.1
  provider: ^6.1.5+1
  flutter_local_notifications: ^18.0.1
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  image_picker: ^1.0.7
  share_plus: ^10.0.0
  file_picker: ^8.0.0
  path_provider: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.jpg"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/icon.jpg"